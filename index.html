  <style>html,body{background:#0d1521;margin:0}</style>
  <link rel="stylesheet" href="assets/styles.css">
  <script>
    if (location.protocol !== "file:") {
      const manifestLink = document.createElement("link");
      manifestLink.rel = "manifest";
      manifestLink.href = "manifest.json";
      document.head.appendChild(manifestLink);
    }

    const themeMeta = document.createElement("meta");
    themeMeta.name = "theme-color";
    document.head.appendChild(themeMeta);

    const lightSchemeQuery = window.matchMedia ? window.matchMedia("(prefers-color-scheme: light)") : null;
    const applyThemeColor = () => {
      themeMeta.content = lightSchemeQuery && lightSchemeQuery.matches ? "#f8fafc" : "#2d2a5a";
    };

    applyThemeColor();
    if (lightSchemeQuery) {
      if (typeof lightSchemeQuery.addEventListener === "function") {
        lightSchemeQuery.addEventListener("change", applyThemeColor);
      } else if (typeof lightSchemeQuery.addListener === "function") {
        lightSchemeQuery.addListener(applyThemeColor);
      }
    }
  </script>
